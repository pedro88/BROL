# dev.brol.dev → Reverse tunnel SSH vers Metro local (127.0.0.1:8081)
#
# Comment ça marche :
#  1. Sur le poste de dev, on lance `~/bin/expo-tunnel.sh` qui ouvre
#     un tunnel SSH inverse : ssh -R 8081:localhost:8081 piet@vps
#  2. Côté VPS, le port 127.0.0.1:8081 expose alors le Metro du poste.
#  3. Nginx proxifie HTTPS dev.brol.dev → 127.0.0.1:8081.
#
# /!\ Cloudflare DOIT être en "DNS only" (nuage gris) pour ce sous-domaine,
# sinon les WebSockets Metro HMR ne passent pas.
#
# Le bloc HTTPS sera ajouté automatiquement par `certbot --nginx`.

# Map pour distinguer requêtes WebSocket des requêtes HTTP standard
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name dev.brol.dev;

    # Les bundles Metro peuvent être gros (10+ Mo)
    client_max_body_size 0;

    error_page 502 = @tunnel_down;
    location @tunnel_down {
        default_type text/plain;
        return 502 "Tunnel SSH inactif sur le poste de dev. Lance: ~/bin/expo-tunnel.sh\n";
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket pour Metro HMR + Inspector
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Pas de buffering — Metro stream le bundle
        proxy_buffering off;

        # Timeouts longs — le bundling initial peut prendre 30s+ sur SDK 54
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }
}
