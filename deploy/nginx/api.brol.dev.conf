# api.brol.dev → API tRPC + Better-auth (container brol-api sur 127.0.0.1:3001)
# Le bloc HTTPS sera ajouté automatiquement par `certbot --nginx`.

server {
    listen 80;
    listen [::]:80;
    server_name api.brol.dev;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pas de buffering pour permettre le streaming tRPC
        proxy_buffering off;
        proxy_read_timeout 120s;
    }
}
